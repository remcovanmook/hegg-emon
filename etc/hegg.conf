# /etc/hegg/hegg.conf
#
# Environment variables for Hegg service units.
# Uncomment and set values as needed.
# This file is sourced by all hegg systemd units (EnvironmentFile).

# Lock the collector to a specific Hegg device IP.
# Without this the collector auto-detects the first device it sees.
HEGG_DEVICE_IP=

# Path to the shared SQLite database.
HEGG_DB=/var/lib/hegg/hegg.db

# UDP port the Hegg device broadcasts on (almost certainly 16121).
# HEGG_UDP_PORT=16121

# Dashboard HTTP port.
# HEGG_HTTP_PORT=8080

# Prometheus metrics port.
# HEGG_PROMETHEUS_PORT=9101

# MQTT broker for Home Assistant integration (hegg-mqtt.service only).
# HEGG_MQTT_HOST=192.168.1.10
# HEGG_MQTT_PORT=1883
# HEGG_MQTT_USER=
# HEGG_MQTT_PASS=
