<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Live energy monitor dashboard for the Hegg device." />
  <title>Hegg · Energy Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M16 2L4 16h9l-1 10 12-14h-9l1-10z" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-text">Hegg</span>
        <span class="logo-sub">Energy Monitor</span>
      </div>
      <div class="header-controls">
        <label class="range-label" for="history-range">History</label>
        <select id="history-range" class="range-select">
          <option value="1">1 h</option>
          <option value="6">6 h</option>
          <option value="24" selected>24 h</option>
          <option value="72">3 d</option>
          <option value="168">7 d</option>
        </select>
        <div class="connection-status" id="connection-status" role="status" aria-live="polite">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-label" id="status-label">Connecting…</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- ── Power ── -->
    <section class="section" aria-labelledby="power-heading">
      <h1 id="power-heading" class="section-title">Power</h1>
      <div class="cards-row">
        <article class="card card--delivered">
          <div class="card-icon" aria-hidden="true">↓</div>
          <div class="card-label">Delivered</div>
          <div class="card-value" id="power-delivered">—</div>
          <div class="card-unit">kW</div>
          <div class="card-bar-track" aria-hidden="true">
            <div class="card-bar-fill" id="bar-delivered"></div>
          </div>
        </article>
        <article class="card card--returned">
          <div class="card-icon" aria-hidden="true">↑</div>
          <div class="card-label">Returned</div>
          <div class="card-value" id="power-returned">—</div>
          <div class="card-unit">kW</div>
          <div class="card-bar-track" aria-hidden="true">
            <div class="card-bar-fill" id="bar-returned"></div>
          </div>
        </article>
        <article class="card card--net">
          <div class="card-icon" aria-hidden="true">⚡</div>
          <div class="card-label">Net</div>
          <div class="card-value" id="power-net">—</div>
          <div class="card-unit">kW</div>
          <div class="card-hint" id="net-hint"></div>
        </article>
      </div>
      <div class="chart-card">
        <div class="chart-label">Power over time — <span class="chart-legend"><span class="leg delivered"></span>Delivered <span class="leg returned"></span>Returned</span></div>
        <canvas id="chart-power" aria-label="Power history"></canvas>
      </div>
    </section>

    <!-- ── Voltage ── -->
    <section class="section" aria-labelledby="voltage-heading">
      <h2 id="voltage-heading" class="section-title">Voltage</h2>
      <div class="cards-row cards-row--three">
        <article class="card card--phase" id="card-v-l1">
          <div class="phase-badge">L1</div>
          <div class="card-value" id="voltage-l1">—</div>
          <div class="card-unit">V</div>
        </article>
        <article class="card card--phase" id="card-v-l2">
          <div class="phase-badge">L2</div>
          <div class="card-value" id="voltage-l2">—</div>
          <div class="card-unit">V</div>
        </article>
        <article class="card card--phase" id="card-v-l3">
          <div class="phase-badge">L3</div>
          <div class="card-value" id="voltage-l3">—</div>
          <div class="card-unit">V</div>
        </article>
      </div>
      <div class="chart-card">
        <div class="chart-label">Voltage per phase — <span class="chart-legend"><span class="leg l1"></span>L1 <span class="leg l2"></span>L2 <span class="leg l3"></span>L3</span></div>
        <canvas id="chart-voltage" aria-label="Voltage history"></canvas>
      </div>
    </section>

    <!-- ── Current ── -->
    <section class="section" aria-labelledby="current-heading">
      <h2 id="current-heading" class="section-title">Current</h2>
      <div class="cards-row cards-row--three">
        <article class="card card--phase" id="card-c-l1">
          <div class="phase-badge">L1</div>
          <div class="card-value" id="current-l1">—</div>
          <div class="card-unit">A</div>
        </article>
        <article class="card card--phase" id="card-c-l2">
          <div class="phase-badge">L2</div>
          <div class="card-value" id="current-l2">—</div>
          <div class="card-unit">A</div>
        </article>
        <article class="card card--phase" id="card-c-l3">
          <div class="phase-badge">L3</div>
          <div class="card-value" id="current-l3">—</div>
          <div class="card-unit">A</div>
        </article>
      </div>
      <div class="chart-card">
        <div class="chart-label">Current per phase — <span class="chart-legend"><span class="leg l1"></span>L1 <span class="leg l2"></span>L2 <span class="leg l3"></span>L3</span></div>
        <canvas id="chart-current" aria-label="Current history"></canvas>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span id="device-serial">—</span>
      <span id="last-updated">—</span>
    </div>
  </footer>

  <!-- Chart.js + date adapter + annotation plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
