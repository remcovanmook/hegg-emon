<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Live energy monitor dashboard for the Hegg device." />
  <title>Hegg · Energy Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M16 2L4 16h9l-1 10 12-14h-9l1-10z" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-text">Hegg</span>
        <span class="logo-sub">Energy Monitor</span>
      </div>
      <div class="header-controls">
        <label class="range-label" for="history-range">History</label>
        <select id="history-range" class="range-select">
          <option value="1">1 h</option>
          <option value="6">6 h</option>
          <option value="24" selected>24 h</option>
          <option value="72">3 d</option>
          <option value="168">7 d</option>
        </select>
        <span class="header-time" id="header-time" aria-live="off">—</span>
        <div class="connection-status" id="connection-status" role="status" aria-live="polite">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-label" id="status-label">Connecting…</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- ── Summary strip ── -->
    <section class="section section--summary" aria-labelledby="summary-heading">
      <h1 id="summary-heading" class="sr-only">Summary</h1>
      <div class="summary-strip">

        <!-- Energy In -->
        <div class="summary-item summary-item--energy">
          <div class="summary-item-header">Energy In</div>
          <div class="energy-row energy-row--main">
            <span class="energy-label"></span>
            <span class="energy-val" id="energy-in-total">—</span>
            <span class="energy-unit">kWh</span>
            <span class="energy-sep">/</span>
            <span class="energy-delta" id="energy-in-total-delta"></span>
          </div>
          <div class="energy-row energy-row--sub">
            <span class="energy-label">T1</span>
            <span class="energy-val" id="energy-in-t1">—</span>
            <span class="energy-unit">kWh</span>
            <span class="energy-sep">/</span>
            <span class="energy-delta" id="energy-in-t1-delta"></span>
          </div>
          <div class="energy-row energy-row--sub">
            <span class="energy-label">T2</span>
            <span class="energy-val" id="energy-in-t2">—</span>
            <span class="energy-unit">kWh</span>
            <span class="energy-sep">/</span>
            <span class="energy-delta" id="energy-in-t2-delta"></span>
          </div>
        </div>

        <!-- Energy Out -->
        <div class="summary-item summary-item--energy">
          <div class="summary-item-header">Energy Out</div>
          <div class="energy-row energy-row--main">
            <span class="energy-label"></span>
            <span class="energy-val" id="energy-out-total">—</span>
            <span class="energy-unit">kWh</span>
            <span class="energy-sep">/</span>
            <span class="energy-delta" id="energy-out-total-delta"></span>
          </div>
          <div class="energy-row energy-row--sub">
            <span class="energy-label">T1</span>
            <span class="energy-val" id="energy-out-t1">—</span>
            <span class="energy-unit">kWh</span>
            <span class="energy-sep">/</span>
            <span class="energy-delta" id="energy-out-t1-delta"></span>
          </div>
          <div class="energy-row energy-row--sub">
            <span class="energy-label">T2</span>
            <span class="energy-val" id="energy-out-t2">—</span>
            <span class="energy-unit">kWh</span>
            <span class="energy-sep">/</span>
            <span class="energy-delta" id="energy-out-t2-delta"></span>
          </div>
        </div>

        <!-- Gas -->
        <div class="summary-item">
          <div class="summary-item-header">Gas</div>
          <div class="energy-row energy-row--main">
            <span class="energy-val" id="gas-delivered">—</span>
            <span class="energy-unit">m³</span>
            <span class="energy-sep">/</span>
            <span class="energy-delta" id="gas-delta"></span>
          </div>
        </div>

        <!-- Device — model in header, details as sub-rows -->
        <div class="summary-item summary-item--device">
          <div class="summary-item-header">
            Device <span class="header-device-model" id="device-model"></span>
          </div>
          <div class="energy-row energy-row--sub">
            <span class="energy-label">IP</span>
            <span class="energy-val" id="device-ip">—</span>
          </div>
          <div class="energy-row energy-row--sub">
            <span class="energy-label">ID</span>
            <span class="energy-val" id="device-serial">—</span>
          </div>
          <div class="energy-row energy-row--sub">
            <span class="energy-label">WiFi</span>
            <span class="energy-val" id="device-rssi">—</span>
          </div>
          <div class="energy-row energy-row--sub">
            <span class="energy-label">SW</span>
            <span class="energy-val" id="device-sw">—</span>
          </div>
        </div>

      </div>
    </section>

    <!-- ── Power ── -->
    <section class="section" aria-labelledby="power-heading">
      <h2 id="power-heading" class="section-title">Power</h2>
      <div class="power-display" id="power-display">
        <div class="power-direction" id="power-direction">—</div>
        <div class="power-value-row">
          <span class="power-value mono" id="power-net-val">—</span>
          <span class="power-unit">W</span>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-label">Power over time</div>
        <div class="chart-wrapper"><canvas id="chart-power" aria-label="Net power history"></canvas></div>
      </div>
    </section>

    <!-- ── Voltage (inline charts per phase) ── -->
    <section class="section" aria-labelledby="voltage-heading">
      <h2 id="voltage-heading" class="section-title">Voltage</h2>
      <div class="cards-row cards-row--three">
        <article class="card card--phase card--with-chart" id="card-v-l1">
          <div class="phase-row">
            <div class="phase-badge">L1</div>
            <div class="phase-value-group">
              <div class="card-value" id="voltage-l1">—</div>
              <div class="card-unit">V</div>
            </div>
          </div>
          <div class="chart-wrapper chart-wrapper--inline">
            <canvas id="chart-v-l1" aria-label="L1 voltage history"></canvas>
          </div>
        </article>
        <article class="card card--phase card--with-chart" id="card-v-l2">
          <div class="phase-row">
            <div class="phase-badge">L2</div>
            <div class="phase-value-group">
              <div class="card-value" id="voltage-l2">—</div>
              <div class="card-unit">V</div>
            </div>
          </div>
          <div class="chart-wrapper chart-wrapper--inline">
            <canvas id="chart-v-l2" aria-label="L2 voltage history"></canvas>
          </div>
        </article>
        <article class="card card--phase card--with-chart" id="card-v-l3">
          <div class="phase-row">
            <div class="phase-badge">L3</div>
            <div class="phase-value-group">
              <div class="card-value" id="voltage-l3">—</div>
              <div class="card-unit">V</div>
            </div>
          </div>
          <div class="chart-wrapper chart-wrapper--inline">
            <canvas id="chart-v-l3" aria-label="L3 voltage history"></canvas>
          </div>
        </article>
      </div>
    </section>

    <!-- ── Current (inline charts per phase) ── -->
    <section class="section" aria-labelledby="current-heading">
      <h2 id="current-heading" class="section-title">Current</h2>
      <div class="cards-row cards-row--three">
        <article class="card card--phase card--with-chart" id="card-c-l1">
          <div class="phase-row">
            <div class="phase-badge">L1</div>
            <div class="phase-value-group">
              <div class="card-value" id="current-l1">—</div>
              <div class="card-unit">A</div>
            </div>
          </div>
          <div class="chart-wrapper chart-wrapper--inline">
            <canvas id="chart-c-l1" aria-label="L1 current history"></canvas>
          </div>
        </article>
        <article class="card card--phase card--with-chart" id="card-c-l2">
          <div class="phase-row">
            <div class="phase-badge">L2</div>
            <div class="phase-value-group">
              <div class="card-value" id="current-l2">—</div>
              <div class="card-unit">A</div>
            </div>
          </div>
          <div class="chart-wrapper chart-wrapper--inline">
            <canvas id="chart-c-l2" aria-label="L2 current history"></canvas>
          </div>
        </article>
        <article class="card card--phase card--with-chart" id="card-c-l3">
          <div class="phase-row">
            <div class="phase-badge">L3</div>
            <div class="phase-value-group">
              <div class="card-value" id="current-l3">—</div>
              <div class="card-unit">A</div>
            </div>
          </div>
          <div class="chart-wrapper chart-wrapper--inline">
            <canvas id="chart-c-l3" aria-label="L3 current history"></canvas>
          </div>
        </article>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span id="last-updated">—</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
